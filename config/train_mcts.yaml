    #   max_game_moves: 19
    # - path: data/minimal_endgames_K_vs_KBN_easy.json
    #   weight: 0.0
    #   max_game_moves: 19

  follow_dataset_trajectory: true # If true, select dataset move deterministically when on solution path (policy target still from MCTS)
  progress_bar: true
  max_training_time_seconds: null # Maximum training time in seconds. At the end of each iteration, predicts total elapsed time after next iteration and stops if it would exceed this limit. Set to null to disable. Example: 3600 for 1 hour, 7200 for 2 hours.
  draw_reward: 0.0 # Fixed reward value for draws. Set to null to use draw_reward_table
  # Dict: draw_termination -> int. 0 = exclude from buffer; n>0 = store only last n moves; absent = full game
  draw_sample_ratio: null  # null = uniform. 0.4 = 40% draws per batch. Control draw ratio directly.
  last_n_moves_to_store:
    THREEFOLD_REPETITION: 9
    FIVEFOLD_REPETITION: 9
    STALEMATE: 1
    FIFTY_MOVES: 0
    SEVENTYFIVE_MOVES: 0
    MAX_MOVES: 0
    INSUFFICIENT_MATERIAL: 2
