# @package _global_
# config/train_mcts.yaml

defaults:
  - _self_ # Allows values defined here to be defaults
#  - override hydra/job_logging: colorlog # Optional: for nicer logging
#  - override hydra/hydra_logging: colorlog # Optional: for nicer logging

hydra:
  run:
    dir: outputs/mcts_train/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/mcts_train/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

# Target the main Config dataclass
_target_: utils.config_schema_rl.Config

network:
  # Target the specific NetworkConfig dataclass
  _target_: utils.config_schema_rl.NetworkConfig
  # Values here override defaults in the dataclass
  input_channels: 119  # 8-step AlphaZero history (112) + 7 meta planes for Legacy board
  dim_piece_type: 16
  board_size: 8
  num_residual_layers: 40
  initial_conv_block_out_channels: [128]
  residual_blocks_out_channels: [[128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128], [128]]
  action_space_size: 4672
  num_pieces: 32
  value_head_hidden_size: 512
  # Policy head structure
  policy_linear_out_features: [4672] # e.g., [1024, 512, 4672]; last must equal action_space_size
  conv_bias: false # Whether to use bias in convolutional layers
  batch_norm_eps: 1e-5  # BatchNorm2d epsilon. Use 1e-4 or 1e-3 for TPU stability if BN params become NaN.
  policy_dropout: 0.0
  value_dropout: 0.0
  conv_dropout: 0.0
  freeze_first_n_conv_layers: null  # Freeze first N layers of conv body. Training only layers after. 0 = train all.

# New Env section
env:
  _target_: utils.config_schema_rl.EnvConfig
  type: chess  # "chess" or "gomoku" - specifies which environment to use
  observation_mode: vector
  render_mode: rgb_array # Set to null or remove for no rendering
  save_video_folder: './videos' # Set to null or remove for no video saving
  history_steps: 8

mcts:
  _target_: utils.config_schema_rl.MCTSConfig
  iterations: 512  # More search to find mate
  c_puct: 1.41     # Moderate (not too high!)
  temperature_start: 1.0  # Some randomness early
  temperature_end: 0.3
  temperature_decay_moves: 10  # Quick transition
  dirichlet_alpha: 0.3
  dirichlet_epsilon: 0.0
  batch_size: 16  # Per-game batch (keep small to avoid MCTS variance)
  pre_init_draws: true  # Pre-init draw terminals (stalemate, insufficient material, etc.). Set true to enable; false to revert.
  

optimizer:
  _target_: utils.config_schema_rl.OptimizerConfig
  type: Adam
  learning_rate: 1e-5
  # momentum: 0.9 # Not needed for Adam default
  weight_decay: 1e-4

training:
  _target_: utils.config_schema_rl.TrainingConfig
  replay_buffer_size: 16384
  device: auto # If device is cpu and multiprocessing is false and render_mode is not null, you can see the pygame window
  amp: true # Enable CUDA AMP (mixed precision) during training
  num_training_iterations: 20
  num_training_steps: 40
  batch_size: 64
  grad_clip_norm: 1.0  # Gradient clipping for TPU stability; set null to disable
  tpu_learning_rate_multiplier: 0.2  # Scale LR by this on TPU (0.2 = 5x lower) to avoid NaN after a few steps
  tpu_clamp_bn_params: true  # Replace NaN/Inf in BN params after optimizer step (fixes TPU Adam corruption)
  diagnose_tpu_gradients: false  # Set true to log grad norms, loss components, batch stats when on TPU
  replay_buffer_float32: false  # Set true on TPU to avoid float16 underflow of policy probs (can cause NaN)
  skip_replay_buffer_load: false  # Set true to skip loading buffer (use when buffer may cause NaN; will refill from self-play)
  use_multiprocessing: true # Set to false for sequential self-play
  self_play_workers: null # Example: Use 8 parallel workers for self-play games
  games_per_worker: 1  # Concurrent games per worker (increases parallelism with inference server)
  use_inference_server: true # Use a dedicated GPU/TPU inference process (or thread for TPU)
  inference_server_device: null # Example: "cuda:0", "xla" for TPU v5e. On Kaggle TPU kernel, use null (auto) or xla - cuda:0 may not exist
  self_play_dtype: null  # float16, float32, or null for auto (float16 on cuda/mps, float32 elsewhere)
  inference_server_max_batch_size: 512  # Max batch size for self-play inference; null = use training batch_size
  inference_server_max_wait_ms: 0  # Longer wait to collect requests from multiple workers
  inference_server_min_stacked_requests: 0  # Min requests before processing; null = max(1, max_stacked_requests // 2)
  inference_server_logging_enabled: false  # Set true to debug GPU inference (startup, throughput, exceptions)
  enable_thermal_pause: false
  manual_pause_seconds: null
  self_play_steps_per_epoch: 1024
  continual_training: true
  continual_queue_maxsize: 64
  max_game_moves: 16
  checkpoint_dir: ./checkpoints
  checkpoint_load: null # Dir (e.g. ./checkpoints) or direct file path (e.g. ./checkpoints/model.pth)
  game_history_dir: ${hydra:runtime.output_dir}/game_history # Directory to save game history files. Set to null to disable.
  initial_board_fen:
    - path: data/mate_in_1.json
      weight: 0.2
      max_game_moves: 1
    - path: data/mate_in_2.json
      weight: 0.3
      max_game_moves: 10
    # - path: data/mate_in_3.json
    #   weight: 0.4
    #   max_game_moves: 12
    # - path: data/mate_in_4.json
    #   weight: 0.1
    #   max_game_moves: 14
    # - path: data/mate_in_5.json
    #   weight: 0.3
    #   max_game_moves: 16

    - path: data/minimal_endgames_mate_in_1.json
      weight: 0.2
      max_game_moves: 1
    - path: data/minimal_endgames_mate_in_2.json
      weight: 0.3
      max_game_moves: 7
    # - path: data/minimal_endgames_mate_in_3.json
    #   weight: 0.4
    #   max_game_moves: 9
    # - path: data/minimal_endgames_mate_in_4.json
    #   weight: 0.1
    #   max_game_moves: 11
    # - path: data/minimal_endgames_mate_in_5.json
    #   weight: 0.0
    #   max_game_moves: 13

    # - path: data/endgame-crushing_without_defensive_move-long-mate-quite_move-very_long.json
    #   weight: 0.3
    #   max_game_moves: 100
    # - path: data/minimal_endgames_K_vs_KQ_easy.json
    #   weight: 0.2
    #   max_game_moves: 19
    # - path: data/minimal_endgames_K_vs_KR_easy.json
    #   weight: 0.2
    #   max_game_moves: 19
    # - path: data/minimal_endgames_K_vs_KBB_easy.json
